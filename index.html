<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Shrine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="background.gif" class="bg-video" alt="">

    <div class="container">

        <h1 id="typing-text" class="fade-in"></h1>

        <div class="gallery-grid">
            <img src="images/mantan1.jpg" class="card">
            <img src="images/mantan2.jpg" class="card">
            <img src="images/mantan3.jpg" class="card">
            <img src="images/mantan4.jpg" class="card">
            <img src="images/songmin1.jpg" class="card idol">
            <img src="images/songmin2.jpg" class="card idol">
        </div>

        <div class="bottom-content-section">

            <div class="lyrics-container">
                <p id="lyrics-text" class="bold-lyrics"></p>
            </div>

            <div class="sub-lyrics-section" id="about-you-section">
                <div class="divider"></div>
                <span class="lyric-line">do you think I have forgotten?</span>
                <span class="lyric-line">do you think I have forgotten?</span>
                <span class="lyric-line">do you think I have forgotten about you?</span>
            </div>

            <audio id="audio" loop preload="auto">
                <source src="song.mp3" type="audio/mpeg">
            </audio>
            <audio id="backsound" loop preload="auto">
                <source src="backsound.mp3" type="audio/mpeg">
            </audio>

            <button onclick="toggleAudio()" class="neon-btn" id="play-btn">Play Memory</button>

        </div>

        <div class="bottom-section">
            <div class="controls">
                <button id="secret-btn" class="neon-btn">Unveil Secret</button>
                <button onclick="toggleLetter()" class="neon-btn">Open The Letter</button>
            </div>
        </div>

    </div>

    <div id="letter-modal" class="hidden">
        <div class="letter-content">
            <h2>A Note for You</h2>
            <p id="letter-text"></p>
            <button onclick="toggleLetter()" class="neon-btn">Close</button>
        </div>
    </div>

    <div id="secret-modal" class="hidden">
        <div class="letter-content">
            <h2>Unveil Secret</h2>
            <p id="secret-text"></p>
            <button onclick="document.getElementById('secret-modal').classList.add('hidden')" class="neon-btn">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
