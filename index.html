<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Shrine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Video Background -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="images/background.mp4" type="video/mp4">
    </video>

    <div class="container">
        <!-- Judul (Hanya Fade In, tidak ada efek ketik) -->
        <h1 id="typing-text" class="fade-in">Digital Shrine</h1>

        <!-- Lirik dengan Efek Ketik -->
        <div class="audio-lirik-section">
            <div class="lyrics-container">
                <p id="lyrics-text"></p>
            </div>
            <button onclick="toggleAudio()" class="neon-btn" id="play-btn">Play Memory</button>
            <audio id="audio" loop preload="auto">
                <source src="song.mp3" type="audio/mpeg">
            </audio>
        </div>

        <!-- Galeri Foto -->
        <div class="gallery-grid">
            <img src="images/mantan1.jpg" class="card">
            <img src="images/mantan2.jpg" class="card">
            <img src="images/mantan3.jpg" class="card">
            <img src="images/mantan4.jpg" class="card">
            <img src="images/songmin1.jpg" class="card idol">
            <img src="images/songmin2.jpg" class="card idol">
        </div>

        <!-- Tombol Kontrol Bawah (Pastikan posisi ini di paling bawah container) -->
        <div class="controls">
            <button id="secret-btn" class="neon-btn">Unveil Secret</button>
            <button onclick="toggleLetter()" class="neon-btn">Open The Letter</button>
        </div>

        <!-- Easter Egg -->
        <p id="easter-egg" class="hidden">Hidden Truth: Everything ends so something better can begin. You're doing great.</p>
    </div>

    <!-- Modal Surat -->
    <div id="letter-modal" class="hidden">
        <div class="letter-content">
            <h2>A Note for You</h2>
            <p id="letter-text"></p>
            <button onclick="toggleLetter()" class="neon-btn" style="margin-top:20px">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
